# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3e33f15eca7b32e62ea7137311172df5"
name = "fluxbot-studio-ia"
application_url = "https://app.fluxbotia.com"
embedded = true
handle = "fluxbot-studio-ia"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "quickstart-c8cc9986.myshopify.com"

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_orders,read_customers,read_content,read_locales,read_online_store_pages,read_themes"

[app_proxy]
url = "https://app.fluxbotia.com"
subpath = "fluxbot"
prefix = "apps"

[auth]
redirect_urls = [
  "https://app.fluxbotia.com/auth/callback",
  "https://app.fluxbotia.com/auth/shopify/callback",
  "https://app.fluxbotia.com/api/auth/callback"
]

[pos]
embedded = false

[[extensions]]
path = "extensions/chat-widget"
