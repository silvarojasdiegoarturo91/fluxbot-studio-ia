# Shopify production app configuration for FluxBot Studio.

client_id = "3e33f15eca7b32e62ea7137311172df5"
name = "fluxbot-studio-ia"
application_url = "https://app.fluxbotia.com"
embedded = true
handle = "fluxbot-studio-ia"

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "/api/webhooks"

[access_scopes]
scopes = "read_products,read_orders,read_content,read_online_store_pages,read_themes"

[app_proxy]
url = "https://app.fluxbotia.com"
subpath = "fluxbot"
prefix = "apps"

[auth]
redirect_urls = [
  "https://app.fluxbotia.com/auth/callback",
  "https://app.fluxbotia.com/auth/shopify/callback",
  "https://app.fluxbotia.com/api/auth/callback"
]

[pos]
embedded = false

[[extensions]]
path = "extensions/chat-widget"
