name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/shopify-admin-app/**"
      - "infra/prisma/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/shopify-admin-app/**"
      - "infra/prisma/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      E2E_TEST_MODE: "true"
      DATABASE_URL: postgresql://test:test@localhost:5433/test_db?schema=public
      REDIS_URL: redis://localhost:6380
      SHOPIFY_APP_URL: http://localhost:3002
      SHOPIFY_SHOP: quickstart-c8cc9986.myshopify.com
      SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
      SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
      IA_BACKEND_URL: http://localhost:3001
      IA_BACKEND_API_KEY: dev_master_key
      E2E_BASE_URL: http://localhost:3002
      PORT: "3002"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: |
          cd apps/shopify-admin-app
          npm run prisma:generate

      - name: Run DB migrations
        run: |
          cd apps/shopify-admin-app
          npx prisma migrate deploy --schema ../../infra/prisma/schema.prisma

      - name: Install Playwright browsers
        run: |
          cd apps/shopify-admin-app
          npx playwright install chromium --with-deps

      - name: Build app
        run: |
          cd apps/shopify-admin-app
          npm run build
        env:
          SHOPIFY_APP_URL: http://localhost:3002

      - name: Start app server
        run: |
          cd apps/shopify-admin-app
          npm run start &
          echo "APP_PID=$!" >> $GITHUB_ENV
        env:
          SHOPIFY_APP_URL: http://localhost:3002

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/ -o /dev/null -w "%{http_code}" | grep -qE "^[23]|302"; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Run E2E smoke tests
        run: |
          cd apps/shopify-admin-app
          E2E_SKIP_SERVER=1 npx playwright test tests/e2e/smoke/ --reporter=list
        continue-on-error: false

      - name: Run E2E full suite
        run: |
          cd apps/shopify-admin-app
          E2E_SKIP_SERVER=1 npx playwright test --reporter=list,github
        continue-on-error: false

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/shopify-admin-app/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: apps/shopify-admin-app/test-results/
          retention-days: 7
